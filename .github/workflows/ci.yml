# SPDX-License-Identifier: GPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: linux ${{ matrix.cc }} ${{ matrix.config.name }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
        config:
          - { name: mock, args: "" }
          - { name: sdl-gl,
              args: "-DCOPAL_ENABLE_SDL=ON -DCOPAL_ENABLE_OPENGL=ON" }
          - { name: sdl-software,
              args: "-DCOPAL_ENABLE_SDL=ON" }
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core libsdl2-dev libgl1-mesa-dri

      # Debug + ASan/UBSan across the whole matrix: the white-box suite and
      # the headless example smoke runs all execute sanitized.
      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Debug
          -DCOPAL_ENABLE_SANITIZERS=ON
          ${{ matrix.config.args }}

      - name: Build
        run: cmake --build build -j

      # Force Mesa's software GL so the sdl-gl config's gl_golden runs against
      # llvmpipe: its driver-side allocations then come from libgallium, which
      # tools/lsan.supp suppresses (the LSAN_OPTIONS env is set on the test).
      # Without this the runner's default GL driver leaks under a name
      # LeakSanitizer can't match and the sanitized run fails. No-op for the
      # mock and sdl-software configs, which never touch GL.
      - name: Test
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: ctest --test-dir build --output-on-failure

  # The shared library disables the white-box suite (it needs the static
  # library); this job guards the build itself plus the example smoke runs.
  linux-shared:
    name: linux gcc sdl-gl shared
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core libsdl2-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCOPAL_BUILD_SHARED=ON
          -DCOPAL_ENABLE_SDL=ON -DCOPAL_ENABLE_OPENGL=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  benchmarks:
    name: linux gcc benchmarks
    runs-on: ubuntu-24.04
    continue-on-error: true # informational only; never blocks a merge
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          -DCOPAL_BUILD_BENCHMARKS=ON
          -DCOPAL_BUILD_TESTS=OFF -DCOPAL_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j

      - name: Run
        env:
          COPAL_FONT: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
        run: ./build/benchmarks/copal_bench

  gl-golden:
    name: linux gl golden (swrast)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libgl1-mesa-dri xvfb fonts-dejavu-core

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DCOPAL_ENABLE_SDL=ON -DCOPAL_ENABLE_OPENGL=ON

      - name: Build
        run: cmake --build build -j

      # Under Xvfb with Mesa's software GL: the GL renderer is pixel-verified
      # against the software reference. Skips itself if no GL context comes up.
      - name: Test (GL golden)
        env:
          COPAL_FONT: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: xvfb-run -a ctest --test-dir build -R gl_golden --output-on-failure

  windows:
    name: windows msvc sdl-gl
    runs-on: windows-2022
    env:
      # The test suites take their font from COPAL_FONT (no DejaVu here).
      COPAL_FONT: C:\Windows\Fonts\arial.ttf
    steps:
      - uses: actions/checkout@v7

      # SDL2 is built from source (COPAL_FETCH_SDL2, pinned commit); cache it
      # keyed on the pin recorded in CMakeLists.txt.
      - name: Cache SDL2 sources
        uses: actions/cache@v6
        with:
          path: build/_deps
          key: sdl2-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}

      - name: Configure
        run: >
          cmake -S . -B build
          -DCOPAL_ENABLE_SDL=ON -DCOPAL_ENABLE_OPENGL=ON
          -DCOPAL_FETCH_SDL2=ON

      - name: Build
        run: cmake --build build --config Debug

      - name: Test
        run: ctest --test-dir build -C Debug --output-on-failure

  # 32-bit build: exercises the size_t overflow guard in cl_image_create (only
  # reachable where size_t is 32-bit) and catches any 64-bit width assumption.
  linux-32bit:
    name: linux gcc 32-bit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib fonts-dejavu-core

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS=-m32 -DCMAKE_EXE_LINKER_FLAGS=-m32

      - name: Build
        run: cmake --build build -j

      - name: Test
        env:
          COPAL_FONT: /usr/share/fonts/truetype/dejavu/DejaVuSans.ttf
        run: ctest --test-dir build --output-on-failure

  # MinGW cross-compile: the other Windows toolchain (the msvc job covers MSVC).
  # The headless build (mock backends, no SDL) is cross-compiled and its tests
  # run under Wine; statically linked so no runtime DLLs are needed. The font
  # suites skip themselves without COPAL_FONT.
  mingw:
    name: windows mingw-w64 cross (wine)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64 wine wine64

      - name: Configure
        run: >
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_SYSTEM_NAME=Windows
          -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc
          -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++
          -DCMAKE_EXE_LINKER_FLAGS=-static
          -DCMAKE_CROSSCOMPILING_EMULATOR=wine

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

# macOS is intentionally NOT in the matrix. copal targets Windows and Linux
# (README); macOS is unsupported and untested. The __APPLE__ font-path branch in
# src/text/font.c is best-effort only. Revisit if macOS becomes a supported
# platform.
